<html>
<head>
    <style>
        .cookie-container {
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        .cookie-image {
            width: 50%;
            position: absolute;
        }
        .cookie-image.left {
            left: 0;
        }
        .cookie-image.right {
            right: 0;
        }
    </style>
</head>
<body>
    <div class="cookie-container">
        <img src="left-cookie-image.jpg" class="cookie-image left" alt="Left Cookie">
        <img src="right-cookie-image.jpg" class="cookie-image right" alt="Right Cookie">
    </div>
</body>
</html>

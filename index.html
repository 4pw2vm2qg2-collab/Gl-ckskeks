<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨Glückskeks✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Nunito', sans-serif;
      background-color: #fcebd0; /*Grün (falls keksbild noch geändert wird): e1cc96*/
      overflow: hidden;
      position: relative;
    }

    /* Zettel: volle Breite, startet unsichtbar, vertikal bei 150%, rutscht auf 13% */
   .zettel {
      position: absolute;
      left: 0;
      top: 13%; /* Fixe Position, Höhe Zettel am Ende */
      width: 100vw;
      background: white;
      padding: 1.5em 1em;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      font-size: 1.2em;
      color: #333;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      /* Start: unten außerhalb der Position + klein */
      transform: translateY(150%) scale(0.3); /*translate: höher -> startet weiter unten bis fixe Position; niedriger -> weiter oben;; scale: >1 -> wird kleiner; <1 -> wird größer*/
      transition:
        opacity 1.5s ease,
        transform 1.5s ease;
      z-index: 10;
    }

    .zettel.active {
      opacity: 1;
      pointer-events: auto;
      /* Rutsche nach oben an die "top: 13%" Position */
      transform: translateY(0) scale(1);
    }

    /* Keks-Container: exakt Mitte Bildschirm */
.keks-container {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 320px;
  height: 200px;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

/* Beide Kekshälften nebeneinander */
.keks {
  position: absolute;
  width: 50%;
  top: 0;
  transition: transform 1.5s ease;
  user-select: none;
}

/* Startposition: nebeneinander */
.keks.left {
  left: 0;
  transform: rotate(0deg);
}

.keks.right {
  right: 0;
  transform: rotate(0deg);
}

/* Animation beim Öffnen */
.keks-container.open .keks.left {
  transform: translateY(110px) rotate(-35deg);
}

.keks-container.open .keks.right {
  transform: translateY(130px) rotate(35deg);
}

/* Bilder korrekt skalieren */
img {
  width: 100%;
  height: 55%;
  display: block;
}  
  </style>
</head>
<body>


  <div class="zettel" id="spruch"></div>

  <div class="keks-container" id="keksContainer" role="button" aria-label="Glückskeks öffnen">
      <img src="cookie_left.png" class="keks left" alt="linke Keks-Hälfte">
      <img src="cookie_right.png" class="keks right" alt="rechte Keks-Hälfte">
  </div>

  <script>
    const sprueche = [
        "Ein kleiner Schritt heute öffnet morgen ein große Türe.",
        "Das, was du suchst, sucht auch dich.",
        "Dein Lächeln wird heute jemandem den Tag retten.",
        "Deine Ausdauer zahlt sich bald aus.",
        "Großes entsteht oft aus kleinen Entscheidungen.",
        "Freude findet den, der sie teilt.",
        "Eine mutige Entscheidung bringt Klarheit.",
        "Manchmal führt ein Umweg schneller ans Ziel.",
        "Zwischen frischen Wänden warten neue Möglichkeiten auf dich.",
        "Dein neues Zuhause wird schnell zu deinem Lieblingsort.",
        "Neue Aufgaben werden dir neue Stärken zeigen.",
        "Dein Mut, etwas neues zu wagen, wird belohnt.",
        "Die richtigen Menschen werden deinen Weg begleiten.",
        "Deine Ideen finden den Raum, den sie brauchen.",
        "Dieser Sommer hält eine schöne Überraschung für dich bereit.",
        "Die langen Abende schenken dir besondere Momente.",
        "Dieser Sommer wird dir lange in Erinnerung bleiben.",
        "Sommerwind trägt neue Ideen zu dir.",
        "Die schönsten Erinnerungen entstehen jetzt.",
        "Zwischen Cafés und Straßen findest du unerwartete Begegnungen.",
        "Ein neues Kennzeichen wartet heute auf dich.",
        "Dieses neue Kennzeichen gehört zu einer guten Geschichte.",
        "Neue Kennzeichen bringen dir Glück.",
        "Der beste Weg, sich selbst eine Freude zu machen, ist: zu versuchen, einem andern eine Freude zu bereiten.",
        "Das wertvollste Geschenk eines Freundes ist die Zeit, die er mit dir verbringt!",
        "Unerwartete Freude ist auf dem Weg zu dir",
        "Jemand denkt gerade an dich.",
        "Bald erwartet dich eine freudige Überraschung.",
        "Eine unerwartete Begegnung bringt dir Freude.",
        "Deine Träume sind näher als du denkst.",
        "Jemand wird heute an dich denken – vielleicht sogar mit einem Lächeln.",
        "Ein Glücksmoment wird deinen Tag erhellen.",
        "Du bist toll",
        "Manchmal ist der beste Plan, keinen zu haben.",
        "Lass los, was du nicht kontrollieren kannst.",
        "Heute schaffst du alles was du dir vornimmst.",
    ];

    const keksContainer = document.getElementById("keksContainer");
    const zettel = document.getElementById("spruch");

    keksContainer.addEventListener("click", () => {
      if (keksContainer.classList.contains("open")) return; // nur 1x aktivieren
      keksContainer.classList.add("open");

      const zufall = Math.floor(Math.random() * sprueche.length);
      zettel.textContent = sprueche[zufall];

      zettel.classList.add("active");
    });
  </script>

</body>
</html>
